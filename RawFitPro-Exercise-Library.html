<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="var(--bg)">
<title>RawFitPro — Exercise Library</title>
<style>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font-body);font-size:15px;-webkit-text-size-adjust:100%;overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:inherit;font-size:15px;outline:none;border:none;}
a{color:inherit;text-decoration:none;}

/* ── VARIABLES (CSS Custom Props — iOS 9.3+) ──────────────────────────── */
:root{
  /* ── RawFitPro Brand Palette ── */
  --bg:#1A1A18;       /* was var(--bg) — now dark slate */
  --surf:#252520;     /* was var(--surf) — now slate2     */
  --card:#2E2E28;     /* was var(--card) — now slate3     */
  --cardh:#383830;    /* was var(--cardh)                  */
  --bdr:rgba(200,184,154,.12);  /* was var(--bdr)        */
  --bdr2:rgba(200,184,154,.22);
  --acc:#C0392B;      /* was var(--acc) — now rust red   */
  --accl:#E05040;     /* was var(--accl) — lighter rust   */
  --gold:#D4A853;     /* amber — replaces yellow gold */
  --blue:#3D9EFF;     /* keep blue for info states    */
  --grn:#00CC88;      /* keep green for success       */
  --red:#C0392B;      /* now matches accent           */
  --txt:#F0EBE3;      /* was var(--txt) — warm white     */
  --txtM:#A89880;     /* was var(--mut) — warm muted     */
  --mut:#A89880;
  --dim:#2E2E28;
  --sand:#C8B89A;
  --sandL:#E8D8C0;
  --stone:#6B6456;
  --rust:#C0392B;
  --rust2:#A93226;
  --amber:#D4A853;
  --shadow:0 2px 16px rgba(0,0,0,.5);
  --font-disp:'Barlow Condensed','Arial Narrow',Arial,sans-serif;
  --font-body:'Barlow',Arial,sans-serif;
}
/* ── LIGHT MODE ──────────────────────────────────────────────────────── */
body.light{
  --bg:#F2F2EC; --surf:#FFFFFF; --card:#FFFFFF; --cardh:#F7F7F2;
  --bdr:#E2E2D8; --txt:#1C1C2E; --mut:#8888A0; --dim:#E8E8E0;
  --shadow:0 2px 12px rgba(0,0,0,.10);
}
body.light html,body.light{background:#F2F2EC;color:#1C1C2E;}
body.light .badge-acc{background:rgba(255,78,0,.12);}
body.light .badge-blue{background:rgba(61,158,255,.12);}
body.light .badge-gold{background:rgba(255,179,0,.12);}
body.light .badge-grn{background:rgba(0,204,136,.12);}
body.light .badge-mut{background:rgba(136,136,160,.12);}
body.light .badge-red{background:rgba(255,51,85,.12);}
body.light #topbar{box-shadow:0 1px 0 var(--bdr);}
body.light .card{box-shadow:0 1px 4px rgba(0,0,0,.06);}
body.light .hero{background:linear-gradient(135deg,rgba(255,78,0,.08) 0%,transparent 60%);}
body.light .bg-surf{background:#F7F7F2;}
body.light input.inp,body.light select.inp,body.light textarea.inp{background:#F7F7F2;color:#1C1C2E;}
body.light .sched-bar{background:#FFFFFF!important;border-color:var(--bdr)!important;}
body.light .idea-card{background:#FFFFFF;}
body.light .browser{border-color:var(--bdr);}
/* ── TOGGLE BUTTON ───────────────────────────────────────────────────── */
#theme-toggle{
  background:none;border:1px solid var(--bdr);border-radius:20px;
  padding:5px 12px;font-size:14px;cursor:pointer;color:var(--txt);
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;
  gap:5px;font-weight:600;font-size:12px;white-space:nowrap;
  transition:background .2s,border-color .2s;
}
#theme-toggle:active{opacity:.7;}

/* ── TYPOGRAPHY HELPERS ───────────────────────────────────────────────── */
.hd{font-weight:900;letter-spacing:.5px;text-transform:uppercase;}
.sub{color:var(--mut);font-size:13px;}
.acc{color:var(--acc);}

/* ── LAYOUT ───────────────────────────────────────────────────────────── */
#app{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;}
#topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;-webkit-flex-shrink:0;flex-shrink:0;}
#topbar-logo{font-family:var(--font-disp);font-weight:900;font-size:20px;letter-spacing:1px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:7px;}
#navbar{display:-webkit-flex;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--surf);border-bottom:1px solid var(--bdr);-webkit-flex-shrink:0;flex-shrink:0;scrollbar-width:none;}
#navbar::-webkit-scrollbar{display:none;}
.nav-tab{padding:10px 12px;background:none;border:none;border-bottom:2px solid transparent;font-weight:700;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);white-space:nowrap;cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0;transition:color .2s;touch-action:manipulation;font-family:var(--font-disp);letter-spacing:.5px;}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc);}
#main{-webkit-flex:1;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 90px;}
.screen{display:none;max-width:1100px;width:100%;margin:0 auto;padding:0 4px;}
.screen.active{display:block;}
.dash-cols{display:-webkit-flex;display:flex;gap:16px;-webkit-align-items:flex-start;align-items:flex-start;}
.dash-main{-webkit-flex:1 1 55%;flex:1 1 55%;min-width:0;}
.dash-side{-webkit-flex:1 1 40%;flex:1 1 40%;min-width:260px;}
@media(max-width:720px){.dash-cols{-webkit-flex-direction:column;flex-direction:column;}.dash-side{width:100%;-webkit-flex:none;flex:none;}}

/* ── MOBILE RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:480px){
  #main{padding:12px 10px 110px;padding-bottom:calc(110px + env(safe-area-inset-bottom));}
  .screen{padding:0;}
  .card{padding:14px 12px;}
  .hero{padding:16px 13px;margin-bottom:14px;}
  .hd{font-size:26px!important;}
  .stat-num{font-size:22px!important;}
  .stat{padding:10px 5px;}
  .stat-icon{font-size:16px;margin-bottom:1px;}
  .stat-lbl{font-size:9px;}
  .grid4>*{-webkit-flex:1 1 calc(50% - 4px);flex:1 1 calc(50% - 4px);}
  .btn{padding:13px 14px;font-size:13px;min-height:44px;}
  .btn-sm{padding:11px 12px;font-size:12px;min-height:40px;}
  .btn-icon{padding:8px;min-width:36px;min-height:36px;}
  .sec-title{font-size:22px;font-family:var(--font-disp);letter-spacing:.5px;}
  .client-card{padding:13px 11px;}
  .client-avatar{width:40px;height:40px;font-size:22px;}
  .inp{font-size:16px!important;padding:12px 11px;min-height:44px;}
  select.inp{font-size:16px!important;min-height:44px;}
  textarea.inp{font-size:16px!important;}
  .cal-day-nav button{padding:10px 13px;min-height:44px;}
  .time-label{width:40px;font-size:10px;padding-right:4px;}
  .session-block{padding:8px 10px;min-height:44px;}
  .session-block .s-name{font-size:12px;}
  .session-block .s-meta{font-size:10px;}
  .group-block{padding:8px 10px;}
  .lib-cat-pill{padding:9px 12px;font-size:11px;min-height:38px;}
  .ex-card{padding:12px 11px;}
  #modal-inner{padding:16px 12px 60px;border-radius:20px 20px 0 0;}
  .modal-handle{margin-bottom:20px;}
  .nav-tab{padding:12px 10px;font-size:10px;font-family:var(--font-disp);letter-spacing:.5px;}
  .inner-tab{padding:11px 11px;}
  .opt-goal{min-height:52px;font-size:13px;}
  .pill{padding:7px 13px;font-size:13px;min-height:36px;}
  .badge{font-size:10px;}
  .sched-bar{padding:11px 12px;}
  /* Week grid — horizontal scroll on mobile instead of crushing 7 cols */
  .week-grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -10px;padding:0 10px 8px;}
  .week-grid{min-width:560px;}
  /* Plan builder day buttons — stack to 2 per row */
  .plan-day-row{-webkit-flex-wrap:wrap!important;flex-wrap:wrap!important;}
  .plan-day-btn{-webkit-flex:1 1 calc(33% - 4px)!important;flex:1 1 calc(33% - 4px)!important;min-height:44px!important;}
}

/* ── CARDS ───────────────────────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;}
.card-hover{transition:background .2s;}
.card-hover:active{background:var(--cardh);}

/* ── GRID HELPERS ─────────────────────────────────────────────────────── */
.grid2{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:10px;}
.grid2>*{-webkit-flex:1 1 calc(50% - 5px);flex:1 1 calc(50% - 5px);min-width:130px;}
.grid4{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;}
.grid4>*{-webkit-flex:1 1 calc(25% - 6px);flex:1 1 calc(25% - 6px);min-width:120px;}
.col{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:10px;}
.row{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;}
.row-sb{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;}
.wrap{-webkit-flex-wrap:wrap;flex-wrap:wrap;}

/* ── BUTTONS ─────────────────────────────────────────────────────────── */
.btn{display:inline-block;padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:none;transition:opacity .15s,transform .1s;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.btn:active{opacity:.85;-webkit-transform:scale(.97);transform:scale(.97);}
.btn-primary{background:var(--acc);color:#fff;}
.btn-green{background:var(--grn);color:#000;}
.btn-gold{background:var(--gold);color:#000;}
.btn-ghost{background:transparent;color:var(--txt);border:1px solid var(--bdr);}
.btn-sm{padding:7px 13px;font-size:11px;}
.btn-wide{width:100%;text-align:center;}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;font-size:17px;color:var(--mut);}

/* ── FORM ELEMENTS ───────────────────────────────────────────────────── */
.lbl{display:block;font-weight:700;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-bottom:5px;}
.inp{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 13px;color:var(--txt);font-size:15px;}
.inp:focus{border-color:var(--acc);}
textarea.inp{resize:vertical;min-height:64px;}
select.inp{-webkit-appearance:none;appearance:none;}

/* ── BADGES ──────────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-weight:700;font-size:11px;letter-spacing:.4px;text-transform:uppercase;}
.badge-acc{background:rgba(255,78,0,.15);color:var(--acc);}
.badge-blue{background:rgba(61,158,255,.15);color:var(--blue);}
.badge-gold{background:rgba(255,179,0,.15);color:var(--gold);}
.badge-grn{background:rgba(0,204,136,.15);color:var(--grn);}
.badge-mut{background:rgba(119,119,136,.15);color:var(--mut);}
.badge-red{background:rgba(255,51,85,.15);color:var(--red);}

/* ── PROGRESS BAR ─────────────────────────────────────────────────────── */
.prog-wrap{margin-bottom:14px;}
.prog-meta{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;margin-bottom:5px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.prog-track{height:4px;background:var(--dim);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s;}

/* ── STAT CARDS ──────────────────────────────────────────────────────── */
.stat{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 10px;text-align:center;}
.stat-num{font-weight:900;font-size:34px;line-height:1;}
.stat-lbl{font-weight:700;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-top:3px;}
.stat-icon{font-size:22px;margin-bottom:3px;}

/* ── OPTION BUTTONS (quiz) ───────────────────────────────────────────── */
.opt-btn{display:block;width:100%;padding:11px 13px;border:2px solid var(--bdr);border-radius:8px;background:var(--card);color:var(--txt);font-size:14px;text-align:left;cursor:pointer;transition:all .18s;margin-bottom:6px;}
.opt-btn.sel{border-color:var(--acc);background:rgba(255,78,0,.15);color:var(--acc);}
.opt-grid{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:7px;}
.opt-grid .opt-btn{width:auto;-webkit-flex:1 1 auto;flex:1 1 auto;}
.opt-goal{-webkit-flex:1 1 calc(50% - 4px);flex:1 1 calc(50% - 4px);min-width:130px;padding:13px 11px;}

/* ── TAG PILLS ───────────────────────────────────────────────────────── */
.pill{display:inline-block;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);font-size:12px;cursor:pointer;margin:3px;}
.pill.on{border-color:var(--gold);background:rgba(255,179,0,.15);color:var(--gold);}
.pill.on-red{border-color:var(--red);background:rgba(255,51,85,.15);color:var(--red);}

/* ── SECTION HEADERS ─────────────────────────────────────────────────── */
.sec-title{font-weight:900;font-size:28px;text-transform:uppercase;line-height:1;margin-bottom:4px;font-family:var(--font-disp);letter-spacing:.5px;}
.sec-sub{color:var(--mut);font-size:13px;margin-bottom:18px;}

/* ── NAV INNER TABS ──────────────────────────────────────────────────── */
.inner-tabs{display:-webkit-flex;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--bdr);margin-bottom:16px;scrollbar-width:none;}
.inner-tabs::-webkit-scrollbar{display:none;}
.inner-tab{padding:9px 13px;background:none;border:none;border-bottom:2px solid transparent;font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);white-space:nowrap;cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0;}
.inner-tab.active{border-bottom-color:var(--acc);color:var(--acc);}

/* ── DIVIDER ─────────────────────────────────────────────────────────── */
hr.div{border:none;border-top:1px solid var(--bdr);margin:14px 0;}

/* ── HERO ────────────────────────────────────────────────────────────── */
.hero{background:linear-gradient(135deg,rgba(255,78,0,.12) 0%,transparent 60%);border:1px solid var(--bdr);border-radius:14px;padding:22px 18px;margin-bottom:18px;position:relative;overflow:hidden;}
.hero-bg{position:absolute;right:-10px;top:-10px;font-size:90px;font-weight:900;letter-spacing:-2px;opacity:.05;user-select:none;line-height:1;}

/* ── SCHEDULE BAR ────────────────────────────────────────────────────── */
.sched-bar{border-radius:10px;padding:13px 14px;margin-bottom:7px;cursor:pointer;}
.sched-edit{border-radius:10px;padding:16px;margin-bottom:7px;background:var(--cardh);border:1px solid var(--acc);}

/* ── PLAN OUTPUT ─────────────────────────────────────────────────────── */
.plan-section{margin-bottom:20px;}
.plan-section-title{font-weight:900;font-size:16px;color:var(--acc);text-transform:uppercase;padding-bottom:7px;border-bottom:1px solid var(--bdr);margin-bottom:9px;letter-spacing:.4px;}
.plan-body{font-size:13px;line-height:1.75;white-space:pre-wrap;color:var(--txt);}

/* ── CLIENT CARD ─────────────────────────────────────────────────────── */
.client-card{border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;border:1px solid var(--bdr);background:var(--card);}
.client-avatar{width:46px;height:46px;border-radius:10px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:26px;-webkit-flex-shrink:0;flex-shrink:0;}
.injury-tag{padding:5px 10px;background:rgba(255,179,0,.12);border-radius:6px;font-size:11px;color:var(--gold);margin-top:8px;}

/* ── CONTENT IDEA CARD ───────────────────────────────────────────────── */
.idea-card{border-radius:10px;padding:14px;margin-bottom:9px;border:1px solid var(--bdr);background:var(--card);}
.idea-num{background:rgba(255,68,68,.13);border:1px solid rgba(255,68,68,.3);border-radius:7px;padding:4px 9px;font-weight:800;font-size:12px;color:#FF6666;}

/* ── WEBSITE PREVIEW ─────────────────────────────────────────────────── */
.browser{border:1px solid var(--bdr);border-radius:12px;overflow:hidden;}
.browser-bar{background:var(--surf);padding:9px 13px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:9px;}
.dot{width:11px;height:11px;border-radius:50%;}
.url-bar{-webkit-flex:1;flex:1;background:var(--card);border-radius:5px;padding:4px 10px;font-size:11px;color:var(--mut);}
.site-nav{background:#111;border-bottom:1px solid #1e1e1e;padding:11px 18px;display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;}
.site-logo{font-weight:900;font-size:17px;color:var(--acc);}
.site-links{display:-webkit-flex;display:flex;gap:12px;font-size:11px;font-weight:600;color:#555;}
.site-hero{padding:36px 18px;text-align:center;border-bottom:1px solid #1a1a1a;}
.site-services{padding:22px 18px;}
.svc-item{background:#141414;border:1px solid #1e1e1e;border-radius:9px;padding:13px;text-align:center;-webkit-flex:1 1 calc(50% - 4px);flex:1 1 calc(50% - 4px);}

/* ── TOAST NOTIFICATION ──────────────────────────────────────────────── */
#toast{position:fixed;bottom:80px;left:50%;-webkit-transform:translateX(-50%) translateY(30px);transform:translateX(-50%) translateY(30px);background:var(--grn);color:#000;padding:10px 22px;border-radius:20px;font-weight:700;font-size:13px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}

/* ── MODAL OVERLAY ───────────────────────────────────────────────────── */
#modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:none;-webkit-overflow-scrolling:touch;overflow-y:auto;}
#modal.open{display:block;}
#modal-inner{background:var(--surf);border-radius:16px 16px 0 0;position:absolute;bottom:0;left:0;right:0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 40px;}
.modal-handle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 16px;}

/* ── UTILITIES ───────────────────────────────────────────────────────── */
.mb4{margin-bottom:4px;} .mb8{margin-bottom:8px;} .mb12{margin-bottom:12px;} .mb16{margin-bottom:16px;} .mb20{margin-bottom:20px;}
.mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;}
.p0{padding:0;} .bold{font-weight:700;} .f12{font-size:12px;} .f13{font-size:13px;} .f14{font-size:14px;}
.txt-acc{color:var(--acc);} .txt-gold{color:var(--gold);} .txt-grn{color:var(--grn);} .txt-blue{color:var(--blue);} .txt-mut{color:var(--mut);} .txt-red{color:var(--red);}
.bg-surf{background:var(--surf);}
.full{width:100%;}
.hidden{display:none!important;}
.border-l-acc{border-left:3px solid var(--acc);}
.border-l-blue{border-left:3px solid var(--blue);}
.border-l-gold{border-left:3px solid var(--gold);}
.border-l-grn{border-left:3px solid var(--grn);}
.border-l-yt{border-left:3px solid #FF4444;}
.border-l-ig{border-left:3px solid #E1306C;}
.border-l-tt{border-left:3px solid #69C9D0;}
.italic{font-style:italic;}
.center{text-align:center;}
/* ── CALENDAR ─────────────────────────────────────────────────────── */
.cal-view-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--bdr);background:none;color:var(--mut);font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;}
.cal-view-btn.active{background:var(--acc);border-color:var(--acc);color:#fff;}
.cal-day-nav{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;}
.cal-day-nav button{background:none;border:1px solid var(--bdr);color:var(--txt);border-radius:8px;padding:6px 13px;font-weight:700;cursor:pointer;font-size:14px;}
.time-slot{display:-webkit-flex;display:flex;gap:0;min-height:54px;border-bottom:1px solid var(--bdr);}
.time-label{width:58px;-webkit-flex-shrink:0;flex-shrink:0;padding:8px 6px 0 0;font-size:11px;font-weight:700;color:var(--mut);text-align:right;line-height:1.2;}
.time-content{-webkit-flex:1;flex:1;padding:4px 0 4px 10px;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:4px;}
.session-block{border-radius:9px;padding:9px 12px;cursor:pointer;transition:opacity .15s;position:relative;}
.session-block:active{opacity:.8;}
.session-block .s-name{font-weight:800;font-size:13px;line-height:1.2;}
.session-block .s-meta{font-size:11px;opacity:.85;margin-top:2px;}

// WORKOUT_LOGS[clientId] = [{date,day,sessionId,started,completed,exercises:[{exIdx,setIdx,startedAt,completedAt,repsActual,weightActual}]}]
var WORKOUT_LOGS = {};

// ── STATE ─────────────────────────────────────────────────────────────
var LIB_PICKER_CID = null;  // always null — read-only mode, no picker

// ── MODAL helpers ────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal").classList.add("open");
}
function closeModalDirect() {
  document.getElementById("modal").classList.remove("open");
}
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("modal").addEventListener("click", closeModal);
});

// ── FUNCTIONS ────────────────────────────────────────────────────────

function getClient(id) {
  for(var i=0;i<CLIENTS.length;i++) { if(CLIENTS[i].id===id) return CLIENTS[i]; }
  return null;
}


function diffColor(d) {
  return d==='Beginner'?'var(--grn)':d==='Intermediate'?'var(--gold)':'var(--acc)';
}

function getAllExercises() {
  return EXERCISE_LIB.concat(CUSTOM_EXERCISES);
}


function getFilteredExercises() {
  var all = getAllExercises();
  var s = LIB_SEARCH.trim().toLowerCase();
  return all.filter(function(e) {
    var catMatch = LIB_CAT === 'All' || e.cat === LIB_CAT;
    var searchMatch = !s || e.name.toLowerCase().indexOf(s) > -1
      || e.cat.toLowerCase().indexOf(s) > -1
      || (e.muscles.primary||[]).join(' ').toLowerCase().indexOf(s) > -1
      || (e.desc||'').toLowerCase().indexOf(s) > -1;
    return catMatch && searchMatch;
  });
}


function renderLibrary() {
  var filtered = getFilteredExercises();
  var isPickerMode = !!LIB_PICKER_CID;

  var html = '';

  // Header
  html += '<div class="card mb10" style="background:linear-gradient(135deg,rgba(61,158,255,.1),var(--card));border-color:rgba(61,158,255,.3);padding:14px 16px;">'
    + '<div class="bold txt-blue mb2" style="font-size:13px;text-transform:uppercase;letter-spacing:.5px;">📚 Exercise Library</div>'
    + '<div class="sub f12">'+(isPickerMode?'Select an exercise to add to <strong>'+getClient(LIB_PICKER_CID).name+'\'s</strong> '+PORTAL_EDIT_DAY+' program':''+getAllExercises().length+' exercises · tap any to view full guide + muscle map')+'</div>'
    + '</div>';

  if(isPickerMode) {
    html += '<button class="btn btn-ghost btn-sm mb10" onclick="LIB_PICKER_CID=null;showScreen(\'schedule\',document.querySelector(\'.nav-tab[onclick*=schedule]\'));">← Back to Program</button>';
  }

  // View toggle (browse vs custom builder)
  if(!isPickerMode) {
    html += '<div class="row mb10" style="gap:8px;">'
      + '<button class="cal-view-btn'+(LIB_VIEW==='browse'?' active':'')+'" onclick="LIB_VIEW=\'browse\';renderLibrary()">Browse</button>'
      + '<button class="cal-view-btn'+(LIB_VIEW==='custom'?' active':'')+'" onclick="LIB_VIEW=\'custom\';renderLibrary()">➕ My Exercises ('+CUSTOM_EXERCISES.length+')</button>'
      + '</div>';
  }

  if(LIB_VIEW === 'custom' && !isPickerMode) {
    html += renderCustomExercisePanel();
  } else {
    // Search bar
    html += '<input class="inp mb10" id="lib-search" placeholder="🔍 Search by name, muscle, or equipment..." value="'+esc(LIB_SEARCH)+'" oninput="LIB_SEARCH=this.value;renderLibrary();">';

    // Category pills
    html += '<div class="row wrap mb12" style="gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;">';
    LIB_CATS.forEach(function(cat) {
      html += '<button class="lib-cat-pill'+(LIB_CAT===cat?' active':'')+'" onclick="LIB_CAT=\''+cat+'\';renderLibrary()">'+cat+'</button>';
    });
    html += '</div>';

    // Results count
    html += '<div class="sub f12 mb8" style="padding:0 2px;">'+filtered.length+' exercise'+(filtered.length!==1?'s':'')+''+(LIB_SEARCH||LIB_CAT!=='All'?' found':'')+'</div>';

    if(filtered.length === 0) {
      html += '<div class="card center" style="padding:30px;border-style:dashed;">'
        + '<div style="font-size:32px;margin-bottom:8px;">🤷</div>'
        + '<div class="bold mb4">No exercises found</div>'
        + '<div class="sub f12">Try a different search or category — or add your own custom exercise.</div>'
        + '<button class="btn btn-ghost btn-sm mt10" onclick="LIB_SEARCH=\'\';LIB_CAT=\'All\';renderLibrary()">Clear filters</button>'
        + '</div>';
    } else {
      html += '<div class="col" style="gap:8px;">';
      filtered.forEach(function(ex) {
        var primMuscles = (ex.muscles.primary||[]).join(', ').replace(/_/g,' ');
        var secMuscles  = (ex.muscles.secondary||[]).join(', ').replace(/_/g,' ');
        var isCustom = !!ex.custom;
        html += '<div class="ex-card" onclick="'+(isPickerMode?'pickExercise(\''+ex.id+'\')':'openExerciseDetail(\''+ex.id+'\')')+'">'
          + '<div class="row-sb">'
          + '<div class="ex-name">'+esc(ex.name)+(isCustom?'<span class="custom-badge">CUSTOM</span>':'')+' <span style="font-size:11px;color:var(--mut);">'+esc(ex.equipment)+'</span></div>'
          + '<span style="font-size:10px;font-weight:700;color:'+diffColor(ex.difficulty)+';white-space:nowrap;">'+ex.difficulty+'</span>'
          + '</div>'
          + '<div class="ex-tags">'
          + '<span class="ex-tag cat">'+esc(ex.cat)+'</span>'
          + (ex.muscles.primary||[]).map(function(m){ return '<span class="ex-tag muscle">'+m.replace(/_/g,' ')+'</span>'; }).join('')
          + '</div>'
          + '<div class="sub f11 mt6" style="line-height:1.45;">'+esc((ex.desc||'').substring(0,90))+(ex.desc&&ex.desc.length>90?'...':'')+'</div>'
          + (isPickerMode?'<button class="btn btn-primary btn-sm mt8" onclick="event.stopPropagation();pickExercise(\''+ex.id+'\')">+ Add to Program</button>':'')
          + '</div>';
      });
      html += '</div>';
    }
  }

  document.getElementById('screen-library').innerHTML = html;
  // Re-focus search bar if it exists
  var sb = document.getElementById('lib-search');
  if(sb && document.activeElement !== sb) { /* don't steal focus */ }
}


function openExerciseDetail(exId) {
  var all = getAllExercises();
  var ex = null;
  for(var i=0;i<all.length;i++) { if(all[i].id===exId){ ex=all[i]; break; } }
  if(!ex) return;

  var primColors = {};
  var secColors  = {};
  (ex.muscles.primary||[]).forEach(function(m){ primColors[m]=true; });
  (ex.muscles.secondary||[]).forEach(function(m){ secColors[m]=true; });

  var html = ''
    + '<div class="row-sb mb6">'
    + '<div><div class="bold" style="font-size:20px;line-height:1.1;">'+esc(ex.name)+(ex.custom?'<span class="custom-badge ml6">CUSTOM</span>':'')+'</div>'
    + '<div class="sub f12 mt2">'+esc(ex.cat)+' · '+esc(ex.equipment)+'</div></div>'
    + '<span style="font-size:12px;font-weight:800;color:'+diffColor(ex.difficulty)+';">'+ex.difficulty+'</span>'
    + '</div>'

    // Muscle tags
    + '<div class="row wrap mb12" style="gap:5px;">'
    + '<span style="font-size:11px;font-weight:700;color:var(--mut);">PRIMARY:</span>'
    + (ex.muscles.primary||[]).map(function(m){
        return '<span style="font-size:11px;font-weight:700;background:'+MUSCLE_COLORS[m]+'22;color:'+MUSCLE_COLORS[m]+';padding:2px 9px;border-radius:10px;">'+m.replace(/_/g,' ')+'</span>';
      }).join('')
    + (ex.muscles.secondary&&ex.muscles.secondary.length?'<span style="font-size:11px;font-weight:700;color:var(--mut);margin-left:4px;">SEC:</span>':'')
    + (ex.muscles.secondary||[]).map(function(m){
        return '<span style="font-size:11px;font-weight:700;background:rgba(255,179,0,.15);color:var(--gold);padding:2px 9px;border-radius:10px;">'+m.replace(/_/g,' ')+'</span>';
      }).join('')
    + '</div>'

    // Muscle diagram
    + buildMuscleSVG(ex.muscles.primary||[], ex.muscles.secondary||[])

    // Legend
    + '<div class="row wrap mt6 mb12" style="gap:10px;justify-content:center;">'
    + '<span style="font-size:10px;font-weight:700;"><span style="color:var(--acc);">■</span> Primary</span>'
    + '<span style="font-size:10px;font-weight:700;"><span style="color:var(--gold);">■</span> Secondary</span>'
    + '<span style="font-size:10px;font-weight:700;"><span style="color:#2a2a3a;background:#2a2a3a;border:1px solid #444;display:inline-block;width:8px;height:8px;vertical-align:middle;border-radius:1px;"></span> Not worked</span>'
    + '</div>'

    // Description
    + '<div class="card mb10" style="padding:12px 14px;">'
    + '<div class="bold f12 mb4" style="text-transform:uppercase;letter-spacing:.4px;color:var(--mut);">What It Is</div>'
    + '<div class="f13" style="line-height:1.65;">'+esc(ex.desc)+'</div>'
    + '</div>'

    // Coaching cues
    + (ex.cues&&ex.cues.length?
      '<div class="card mb10" style="padding:12px 14px;border-color:rgba(0,204,136,.2);">'
      + '<div class="bold f12 mb8" style="text-transform:uppercase;letter-spacing:.4px;color:var(--grn);">✅ Coaching Cues</div>'
      + '<div class="col" style="gap:6px;">'
      + ex.cues.map(function(c,i){ return '<div class="f13" style="display:-webkit-flex;display:flex;gap:8px;line-height:1.5;"><span style="color:var(--grn);font-weight:800;flex-shrink:0;">'+(i+1)+'.</span>'+esc(c)+'</div>'; }).join('')
      + '</div></div>'
    :'')

    // Common mistakes
    + (ex.mistakes&&ex.mistakes.length?
      '<div class="card mb10" style="padding:12px 14px;border-color:rgba(255,179,0,.2);">'
      + '<div class="bold f12 mb8" style="text-transform:uppercase;letter-spacing:.4px;color:var(--gold);">⚠️ Common Mistakes</div>'
      + '<div class="col" style="gap:6px;">'
      + ex.mistakes.map(function(m){ return '<div class="f13" style="display:-webkit-flex;display:flex;gap:8px;line-height:1.5;"><span style="color:var(--gold);flex-shrink:0;">✗</span>'+esc(m)+'</div>'; }).join('')
      + '</div></div>'
    :'')

    // YouTube link
    + '<button onclick="window.open(\'https://www.youtube.com/results?search_query='+encodeURIComponent(ex.youtubeQuery||ex.name+' exercise tutorial')+'\',\'_blank\')" class="btn btn-ghost btn-sm" style="display:block;width:100%;text-align:center;margin-bottom:8px;border-color:var(--acc);color:var(--acc);cursor:pointer;">▶ Watch Form Video on YouTube</button>'

    // If in picker mode, show add button
    + (LIB_PICKER_CID?'<button class="btn btn-primary" onclick="closeModalDirect();pickExercise(\''+ex.id+'\')">+ Add to Program</button>':'')
    + '<button class="btn btn-ghost btn-sm mt6" onclick="closeModalDirect()">Close</button>';

  openModal(html);
}

  + '</div>';
}


function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2200);
}
function esc(str) {
  if(!str && str!==0) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}





function closeModal(e) {
  if(!e || e.target===document.getElementById("modal")) {
    document.getElementById("modal").classList.remove("open");
    document.body.style.overflow = "";
  }
}



// ── INIT ─────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", function(){
  renderLibrary();
});
</script>
